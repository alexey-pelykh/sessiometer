name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Pinned stand-in for `stable` — bumped deliberately, never floating, so a new stable
  # release can't introduce a lint that flips `main` red with no code change.
  RUST_STABLE: "1.96.0"
  # Minimum Supported Rust Version — keep in sync with `rust-version` in Cargo.toml.
  RUST_MSRV: "1.87.0"

jobs:
  # Per-job path filtering. The workflow has NO top-level `on: paths:` filter on purpose:
  # a workflow-level path filter makes the required status contexts stop reporting on any
  # PR that misses the filter, which wedges branch protection forever. Instead each real
  # job runs conditionally on these outputs, and `ci-ok` (below) is the single always-running
  # required check. A change to this workflow file re-runs BOTH toolchains — it is
  # listed in both filters — so CI edits are always validated end to end.
  changes:
    name: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              # `include_str!` compile-time inputs for the migration tests (src/migration.rs);
              # a fixture-only edit is still a Rust-affecting change and must run the Rust jobs.
              - 'build/fixtures/**'
              - 'scripts/**'
              # Cargo auto-detects these inputs, so a PR that adds one must run the Rust jobs — else
              # `deny` (no-Security.framework linkage + supply-chain gates) silently skips and the
              # security invariant self-bypasses: `.cargo/**` can inject linker flags or a source
              # replacement, `build.rs`/`**/build.rs` run arbitrary build-time code, and the
              # toolchain/fmt/lint files reconfigure the very gates below.
              - '.cargo/**'
              - 'build.rs'
              - '**/build.rs'
              - 'rust-toolchain.toml'
              - 'rust-toolchain'
              - 'rustfmt.toml'
              - 'clippy.toml'
              - '.github/workflows/ci.yml'
            swift:
              - 'apps/menubar/**'
              # The Rust-emitted wire goldens the Swift byte-drift guard pins against (issue #340,
              # apps/menubar/Tests/WireGoldenTests.swift). A daemon wire change regenerates these
              # under src/** with no apps/menubar/** touch, so without this the swift job would skip
              # and the cross-language drift would land uncaught. (Broad build/fixtures/** matches the
              # rust filter above; an unrelated migration-fixture edit just re-runs swift, which passes.)
              - 'build/fixtures/**'
              - '.github/workflows/ci.yml'

  # Full gate: format, lints, docs, build, tests. `-D warnings` clippy/rustdoc behavior is
  # toolchain-version-sensitive, so the toolchain is pinned (RUST_STABLE) rather than `stable`.
  test:
    name: test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (2026-06-30)
        with:
          toolchain: ${{ env.RUST_STABLE }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: doc
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  # MSRV gate: the crate must build and its tests must pass on the declared minimum
  # supported Rust version (Cargo.toml `rust-version`). Lints/docs are intentionally not
  # run here — `-D warnings` clippy/rustdoc drifts across toolchains and would fail on lint
  # churn unrelated to whether the crate actually works on the MSRV.
  msrv:
    name: msrv
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (2026-06-30)
        with:
          toolchain: ${{ env.RUST_MSRV }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  deny:
    name: deny
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (2026-06-30)
        with:
          toolchain: ${{ env.RUST_STABLE }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: No Security.framework SDK linkage
        run: ./scripts/check-no-security-framework.sh
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-deny
      - name: Supply-chain gates (advisories, sources, licenses)
        run: cargo deny check advisories sources licenses

  # Swift menu-bar app (apps/menubar/, issues #311, #322). Generates the Xcode project from
  # project.yml with XcodeGen, then builds the LSUIElement app AND runs the wire-decoder unit
  # tests (#322 added the MenubarTests standalone logic-test bundle). macos-latest ships a
  # full Xcode; XcodeGen comes from Homebrew. `xcodebuild test` builds `Menubar: all` (so the
  # app skeleton is still compiled) plus the test bundle, then runs it. Unsigned
  # (CODE_SIGNING_ALLOWED=NO) — Developer-ID signing + notarization is #171. The first step is
  # the zero-egress / pure-client guard (#328): the Swift-side peer of the `deny` job's
  # check-no-security-framework.sh, a source-level regression gate that fails if the app grows
  # a Security/Network-framework import, a host-networking symbol, or a network entitlement. It
  # runs here (not a new top-level job) so `ci-ok.needs` — asserted complete by
  # ci-ok-needs-complete (#318) — stays unchanged; the `swift` filter already gates it on
  # apps/menubar/** so it runs whenever the app changes.
  swift:
    name: swift
    needs: changes
    if: needs.changes.outputs.swift == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Zero egress / pure-client (no Security/Network import, no network entitlement)
        run: ./scripts/check-menubar-zero-egress.sh
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: apps/menubar
        run: xcodegen generate
      - name: Build and test
        working-directory: apps/menubar
        run: |
          xcodebuild test \
            -project Menubar.xcodeproj \
            -scheme Menubar \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  # Meta-check (issue #318): assert `ci-ok.needs` names every other job, so a new job can't be
  # added to this workflow and silently sit outside the merge gate's `needs.*.result` rollup.
  # GitHub exposes no "all jobs in this workflow" context, so the parse lives in a script — like
  # the `deny` job's `check-no-security-framework.sh`, and runnable locally. Runs always (no path
  # filter): the invariant must hold on every PR, including docs-only. Its result feeds `ci-ok`
  # below, so a failure here fails the gate — which is why it appears in `ci-ok.needs` itself.
  ci-ok-needs-complete:
    name: ci-ok-needs-complete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assert ci-ok.needs covers every job
        run: ./scripts/check-ci-ok-needs.sh

  # Gate-integrity acknowledgment (issue #317). `ci-ok` and the invariants it rolls
  # up live in PR-mutable files — this workflow, `scripts/**`, `deny.toml`, `.cargo/**`.
  # `main-protection` has no bypass actors and GitHub forbids self-approval, so a
  # *required human review* on those paths would deadlock this solo repo forever
  # (which is why the issue's literal CODEOWNERS ask was rejected). Instead this job
  # makes a gate-definition change LOUD rather than silent: a PR whose diff touches a
  # gate path must carry a `Gate-Change-Acknowledged: <reason>` commit trailer. Like
  # `ci-ok-needs-complete`, it runs always (no path filter) so it can't be skipped
  # past, and it feeds `ci-ok` (hence its presence in `ci-ok.needs`). A PR touching no
  # gate path needs no ack and passes untouched, so ordinary PRs are never blocked.
  gate-change-ack:
    name: gate-change-ack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need base + the PR's commits to diff gate paths and read commit trailers;
          # the default depth-1 checkout has neither.
          fetch-depth: 0
      - name: Require an ack trailer when a PR changes gate-definition files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-gate-change-ack.sh

  # Single always-running summary gate. This is the ONE check branch protection should
  # require: it runs on every PR/push regardless of path filters, and passes only when every
  # real job either succeeded or was legitimately path-skipped. That way a path-skipped
  # `test`/`msrv`/`deny`/`swift` can never wedge a merge, while a genuine failure (or a
  # failed `changes` job) still blocks. Keep `test`/`msrv`/`deny` as named contexts for
  # history/visibility, but make `ci-ok` the required one.
  ci-ok:
    name: ci-ok
    if: always()
    needs: [changes, test, msrv, deny, swift, ci-ok-needs-complete, gate-change-ack]
    runs-on: ubuntu-latest
    steps:
      # `needs.*.result` auto-covers every job in `needs:` above — and the `ci-ok-needs-complete`
      # job asserts that list names every other job, so a new job can't be added to the workflow
      # and silently escape this rollup. A path-skipped job has result `skipped`, which is a pass;
      # only `failure`/`cancelled` fail this gate.
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::A required job failed or was cancelled (results: ${{ join(needs.*.result, ', ') }})"
          exit 1
      - name: Summary
        run: |
          echo "All required jobs passed or were legitimately skipped (results: ${{ join(needs.*.result, ', ') }})."
