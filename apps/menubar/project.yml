# XcodeGen spec for the sessiometer macOS menu-bar app.
#
# The Xcode project is generated from this file — run `xcodegen generate` (the
# resulting `Menubar.xcodeproj` is git-ignored). Per ADR-0010 the Swift app is a
# sibling directory to the Rust crate at the repo root; it links no Rust and is
# NOT a Cargo workspace member. The menu-bar UI + socket client landed across
# #322–#327 (#327 reconciled the bundle identity below); signing/notarization is #171.
name: Menubar
options:
  bundleIdPrefix: org.sessiometer
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
targets:
  Menubar:
    type: application
    platform: macOS
    sources:
      - Sources
      # Launch-at-login daemon agent (#170/#171) — the bundled LaunchAgent plist. Shipped into
      # Contents/Library/LaunchAgents/ so `SMAppService.agent(plistName: "org.sessiometer.agent.plist")`
      # resolves and registers it. Its presence flips `daemonAgentStatus` .notFound → .notRegistered,
      # which makes `LoginItemModel.canStartDaemon` true (the not-running panel's Start affordance goes
      # live). A static bundle resource — sealed into the app signature (no independent signing); its
      # BundleProgram points at the embedded daemon staged by the postBuildScript below.
      - path: LaunchAgents/org.sessiometer.agent.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchAgents
    settings:
      base:
        # Bundle identity — FROZEN (ADR-0027). `org.sessiometer` is the product-FAMILY namespace
        # (never itself a concrete bundle id); every artifact is a peer child on the `<surface>`
        # axis (the app `.menubar` here; the embedded daemon LaunchAgent → org.sessiometer.agent,
        # #329). The #170 SMAppService spike (2026-07-23) empirically proved NO prefix-coupling — a
        # *peer* app id registers the agent fine, no ancestor requirement — and a /council ratified
        # freezing `org.sessiometer.menubar` (not bare `org.sessiometer`, not `.app`) before the
        # first signed release (#171); Sparkle refuses a changed CFBundleIdentifier thereafter.
        # Supersedes the #311 scaffold's com-prefixed id and `Menubar` product name.
        PRODUCT_NAME: Sessiometer
        PRODUCT_BUNDLE_IDENTIFIER: org.sessiometer.menubar
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
        # Pin the app's global accent to the brand-blue asset (#391): `Color.accentColor` / `.tint` then
        # resolve to `Assets.xcassets/AccentColor` (#007aff light / #0a84ff dark) instead of the user's
        # macOS system accent, so a non-blue system accent can't drift the panel hue off the design mock.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Ship the bespoke full-color app icon (#438): the asset compiler resolves `Assets.xcassets/AppIcon`
        # (the 10-size mac AppIcon set generated from the brand SSOT `brand/generate.sh`, #442) and sets
        # `CFBundleIconName`, so the app shows the Cycle-Gauge icon in Dock / Finder / About. Full color is
        # correct on these surfaces — unlike the monochrome menu-bar status-item template glyphs (#325/#437).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Embed the universal `sessiometer` daemon at Contents/Helpers/sessiometer (#171 WS1).
    # postBuildScripts run AFTER the .app wrapper is assembled; the external release script
    # (scripts/release-macos.sh) then signs inside-out (daemon first, app last). The script is
    # RELEASE-ONLY (no-ops for Debug), so `xcodebuild test CODE_SIGNING_ALLOWED=NO` never builds Rust.
    postBuildScripts:
      - name: "Embed universal sessiometer daemon (Release only)"
        script: '"${SRCROOT}/scripts/embed-daemon.sh"'
        shell: /bin/bash
        # Cargo owns incrementality; force the phase to run every build so a src/** change re-embeds.
        basedOnDependencyAnalysis: false
  # Wire-decoder (#322) + socket-transport (#323) + status-store (#324) unit tests. A STANDALONE
  # logic-test bundle: no TEST_HOST, so it never launches the app — it compiles the pure production
  # sources directly alongside the tests (NOT the whole Sources dir: main.swift is the app's
  # top-level AppKit entry, which cannot live in a unit-test bundle). The transport sources are
  # compiled here so the state machine, backoff schedule, path resolver, and the actor shell (driven
  # by an in-process fake connector) are exercised without a real socket; the honest-state machine +
  # `WatchStatusStore` are driven by a synthetic `AsyncStream<TransportEvent>` (no socket, no
  # transport). Runs headless under `xcodebuild test`.
  MenubarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/WireModel.swift
      - path: Sources/TransportEvent.swift
      - path: Sources/WatchStateMachine.swift
      - path: Sources/SocketPathResolver.swift
      - path: Sources/WatchConnection.swift
      - path: Sources/WatchTransport.swift
      # Control-command transport (#358): the short-lived client→daemon write path + its redacted-ack
      # decoder. Compiled here (both are pure logic over the WatchConnection seam — no AppKit) so the
      # one-shot exchange (bounded timeout, connection-refused, closed-before-ack) is driven by the
      # same in-process fake connector as WatchTransport, and SwapAck decoding is exercised, with no
      # real socket and no live daemon.
      - path: Sources/ControlCommandClient.swift
      - path: Sources/SwapAck.swift
      # Capture affordance (#360): the redacted `capture`-ack decoder + the AppKit-free capture model
      # (idle → pending → done → failed). Both are pure logic over the SAME WatchConnection seam, so the
      # capture state machine is driven hermetically by the in-process fake connector — no socket, no live
      # daemon — and the ack decoding is exercised against every wire variant, alongside SwapAck.
      - path: Sources/CaptureAck.swift
      - path: Sources/AccountCaptureModel.swift
      # Swap affordance (#169): the AppKit-free swap model (idle → pending → done → failed) over the SAME
      # WatchConnection seam, so the swap-on-click phase machine — including the sibling-disable window and
      # the bounded-ack recovery a lost reply lands in — is driven hermetically by the in-process fake
      # connector. No socket, no live daemon, and so never a real credential swap in a test run. `SwapAck`
      # is already compiled above as the decoder this model routes on.
      - path: Sources/AccountSwapModel.swift
      # Stats tab (#446): the AppKit-free Stats-tab model (idle → loading → loaded → failed) + its
      # `StatsCommand` / `StatsFailure`, over the SAME WatchConnection seam, so the one-shot `stats` query's
      # phase machine — including the "keep prior series while refetching" gate and the decode/error/transport
      # branches — is driven hermetically by the in-process fake connector. No socket, no live daemon. The
      # `StatsWire` decoder it routes on is already compiled via WireModel.swift above.
      - path: Sources/PanelStatsModel.swift
      # Settings UI (#268): the config-get/set wire codecs — the config-editing sibling of WireModel's
      # watch/stats decoders. Pure Codable (no AppKit), so the decode/encode contract — including the
      # `encodeIfPresent` nil-omission the #268 safety boundary rests on — is exercised hermetically here.
      - path: Sources/ConfigWire.swift
      # Settings UI (#268) model: the pure @MainActor load/apply/draft-diff shell (idle→loading→loaded→failed
      # + idle→applying→applied/rejected/invalidInput). Compiled here (NOT SettingsView/SettingsWindowController
      # — those are SwiftUI/AppKit the headless bundle can't drive) so config-get load, the batched config-set of
      # only-dirty keys, client-side format validation, and the notification-toggle write-through are exercised
      # against the same fake connector as AccountSwapModel — no socket, no live daemon, never a real config write.
      - path: Sources/SettingsModel.swift
      # Launch-at-login (#170) model: the pure @MainActor decision layer over SMAppService — toggle-state
      # derivation, idempotent first-launch register, requiresApproval, the Start-daemon phase machine, and
      # the CLI two-owner guard. Compiled here (NOT SMAppServiceLoginItem.swift — that imports
      # ServiceManagement — nor SettingsView/StartDaemonCard/main.swift, the SwiftUI/AppKit surfaces) so every
      # decision is driven by a fake LoginItemService — no real SMAppService, never a login item or LaunchAgent
      # written by a test run.
      - path: Sources/LoginItemModel.swift
      - path: Sources/HonestStateMachine.swift
      - path: Sources/WatchStatusStore.swift
      # Native swap / all-accounts-exhausted notifications (#267): the pure event deriver + neutral
      # (redacted) content + toggle-gating shell. Compiled here (NOT UserNotificationPresenter.swift or
      # main.swift — those touch UNUserNotificationCenter / AppKit the headless bundle can't drive) so
      # swap/exhausted detection, content redaction, and toggle gating are tested against a spy
      # presenter with no OS notification surface.
      - path: Sources/AccountEventNotifier.swift
      # Status-item gauge (#325): the pure, shape-encoded template `NSImage` factory. Added here (NOT
      # StatusItemController/StatusPanelView/main.swift — those touch NSStatusBar/AppKit UI that a
      # headless logic-test bundle can't drive) so the shape-per-state contract is tested in isolation.
      - path: Sources/StatusGauge.swift
      # Bar-glyph render-parity renderer (#525): the pure template-tint + explicit-pixel-size raster factory
      # `BarGlyphParityTests` drives (NOT RenderBarGlyphTool.swift — that touches CommandLine/exit app-tool
      # surface; the renderer itself is pure AppKit drawing that runs headless). Compiled here so the drift
      # gate re-renders the glyphs in-process and diffs against the committed references.
      - path: Sources/BarGlyphRenderer.swift
      # The compiled asset catalog (#525): the bar-glyph parity gate resolves the REAL bespoke `.symbolset`s
      # via `StatusGauge.image(for:in:)` against THIS bundle — `NSImage(named:)` would swallow them into the
      # fallbackRing here (the logic-test bundle's `Bundle.main` is the xctest runner, not the catalog).
      # actool compiles it into `MenubarTests.xctest/Contents/Resources/Assets.car`.
      - path: Sources/Assets.xcassets
      # Status-panel format (#326): the pure, `src/cli.rs`-mirroring presentation layer (health/reset/pct).
      # Added here (NOT StatusPanelView.swift/main.swift — SwiftUI/AppKit the headless bundle can't drive)
      # so the byte-parity contract with the Rust `status` verb is tested in isolation.
      - path: Sources/StatusPanelFormat.swift
      - path: Tests
    settings:
      base:
        PRODUCT_NAME: MenubarTests
        PRODUCT_BUNDLE_IDENTIFIER: org.sessiometer.menubar.tests
        GENERATE_INFOPLIST_FILE: "YES"
        # Standalone logic-test bundle: no host app to launch (the decoder is pure), so null
        # out the unit-test preset's default host wiring explicitly rather than relying on an
        # undefined TEST_HOST.
        TEST_HOST: ""
        BUNDLE_LOADER: ""
schemes:
  Menubar:
    build:
      targets:
        Menubar: all
        MenubarTests: [test]
    test:
      config: Debug
      targets:
        - MenubarTests
    run:
      config: Debug
