# XcodeGen spec for the sessiometer macOS menu-bar app.
#
# The Xcode project is generated from this file — run `xcodegen generate` (the
# resulting `Menubar.xcodeproj` is git-ignored). Per ADR-0010 the Swift app is a
# sibling directory to the Rust crate at the repo root; it links no Rust and is
# NOT a Cargo workspace member. The menu-bar UI + socket client landed across
# #322–#327 (#327 reconciled the bundle identity below); signing/notarization is #171.
name: Menubar
options:
  bundleIdPrefix: org.sessiometer
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
targets:
  Menubar:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        # Bundle identity per /council 2026-07-06: `org.sessiometer` is the product-FAMILY
        # namespace — never itself a concrete bundle id; every artifact is a peer child (the app
        # here; the embedded daemon LaunchAgent → org.sessiometer.agent, #329). PROVISIONAL,
        # #170-spike-gated: falls back to bare `org.sessiometer` ONLY if the SMAppService spike
        # (#170) shows the agent Label must be prefixed by the app's CFBundleIdentifier. The id
        # needn't freeze until the first Sparkle release (#171). Supersedes the #311 scaffold's
        # com-prefixed id and `Menubar` product name.
        PRODUCT_NAME: Sessiometer
        PRODUCT_BUNDLE_IDENTIFIER: org.sessiometer.menubar
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Info.plist
  # Wire-decoder (#322) + socket-transport (#323) + status-store (#324) unit tests. A STANDALONE
  # logic-test bundle: no TEST_HOST, so it never launches the app — it compiles the pure production
  # sources directly alongside the tests (NOT the whole Sources dir: main.swift is the app's
  # top-level AppKit entry, which cannot live in a unit-test bundle). The transport sources are
  # compiled here so the state machine, backoff schedule, path resolver, and the actor shell (driven
  # by an in-process fake connector) are exercised without a real socket; the honest-state machine +
  # `WatchStatusStore` are driven by a synthetic `AsyncStream<TransportEvent>` (no socket, no
  # transport). Runs headless under `xcodebuild test`.
  MenubarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/WireModel.swift
      - path: Sources/TransportEvent.swift
      - path: Sources/WatchStateMachine.swift
      - path: Sources/SocketPathResolver.swift
      - path: Sources/WatchConnection.swift
      - path: Sources/WatchTransport.swift
      # Control-command transport (#358): the short-lived client→daemon write path + its redacted-ack
      # decoder. Compiled here (both are pure logic over the WatchConnection seam — no AppKit) so the
      # one-shot exchange (bounded timeout, connection-refused, closed-before-ack) is driven by the
      # same in-process fake connector as WatchTransport, and SwapAck decoding is exercised, with no
      # real socket and no live daemon.
      - path: Sources/ControlCommandClient.swift
      - path: Sources/SwapAck.swift
      # Capture affordance (#360): the redacted `capture`-ack decoder + the AppKit-free capture model
      # (idle → pending → done → failed). Both are pure logic over the SAME WatchConnection seam, so the
      # capture state machine is driven hermetically by the in-process fake connector — no socket, no live
      # daemon — and the ack decoding is exercised against every wire variant, alongside SwapAck.
      - path: Sources/CaptureAck.swift
      - path: Sources/AccountCaptureModel.swift
      - path: Sources/HonestStateMachine.swift
      - path: Sources/WatchStatusStore.swift
      # Status-item gauge (#325): the pure, shape-encoded template `NSImage` factory. Added here (NOT
      # StatusItemController/StatusPanelView/main.swift — those touch NSStatusBar/AppKit UI that a
      # headless logic-test bundle can't drive) so the shape-per-state contract is tested in isolation.
      - path: Sources/StatusGauge.swift
      # Status-panel format (#326): the pure, `src/cli.rs`-mirroring presentation layer (health/reset/pct).
      # Added here (NOT StatusPanelView.swift/main.swift — SwiftUI/AppKit the headless bundle can't drive)
      # so the byte-parity contract with the Rust `status` verb is tested in isolation.
      - path: Sources/StatusPanelFormat.swift
      - path: Tests
    settings:
      base:
        PRODUCT_NAME: MenubarTests
        PRODUCT_BUNDLE_IDENTIFIER: org.sessiometer.menubar.tests
        GENERATE_INFOPLIST_FILE: "YES"
        # Standalone logic-test bundle: no host app to launch (the decoder is pure), so null
        # out the unit-test preset's default host wiring explicitly rather than relying on an
        # undefined TEST_HOST.
        TEST_HOST: ""
        BUNDLE_LOADER: ""
schemes:
  Menubar:
    build:
      targets:
        Menubar: all
        MenubarTests: [test]
    test:
      config: Debug
      targets:
        - MenubarTests
    run:
      config: Debug
